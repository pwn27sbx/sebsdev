<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect hack
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      // Store the requested URL in sessionStorage
      sessionStorage.setItem('redirectPath', path + search + hash);
      // Redirect to the base path where the app is hosted
      window.location.replace('/mi-portafolio/');
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
